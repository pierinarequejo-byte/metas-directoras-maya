<style>
:root{
  --or:#D85A1A;--or-d:#B84A10;--or-l:#F06030;--or-bg:#FEF2EC;
  --gr:#27AE60;--gr-bg:#EAF7EF;
  --re:#C0392B;--re-bg:#FDEDEC;
  --bl:#2980B9;--bl-bg:#EBF5FB;
  --ye:#F39C12;--ye-bg:#FEF9E7;
  --gy1:#F8F9FA;--gy2:#E9ECEF;--gy3:#DEE2E6;--gy4:#ADB5BD;--gy5:#6C757D;--gy6:#495057;--gy7:#343A40;
  --wh:#fff;
  --sh:0 2px 12px rgba(0,0,0,.08);--sh2:0 6px 24px rgba(0,0,0,.12);
  --r:12px;--r-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--gy1);color:var(--gy7);min-height:100vh;}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,var(--or) 0%,var(--or-d) 100%);color:#fff;
  padding:0 28px;display:flex;align-items:center;justify-content:space-between;
  min-height:66px;box-shadow:0 2px 16px rgba(216,90,26,.4);position:sticky;top:0;z-index:100;}
.hdr-l{display:flex;align-items:center;gap:14px;}
.logo{width:40px;height:40px;background:#fff;border-radius:8px;display:flex;
  align-items:center;justify-content:center;font-weight:900;font-size:20px;color:var(--or);flex-shrink:0;}
.hdr-title{font-size:18px;font-weight:700;}
.hdr-sub{font-size:11px;opacity:.8;margin-top:1px;}
.hdr-badge{background:rgba(255,255,255,.2);border-radius:6px;padding:3px 10px;
  font-size:12px;font-weight:600;margin-left:8px;}
.hdr-r{font-size:11px;opacity:.75;text-align:right;line-height:1.5;}

/* ── TABS ── */
.tabs{background:#fff;border-bottom:2px solid var(--gy2);display:flex;gap:0;padding:0 28px;}
.tab{padding:14px 22px;font-size:13px;font-weight:600;color:var(--gy5);cursor:pointer;
  border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;
  display:flex;align-items:center;gap:7px;white-space:nowrap;}
.tab:hover{color:var(--or);}
.tab.active{color:var(--or);border-bottom-color:var(--or);}
.tab-icon{font-size:15px;}

/* ── FILTER BAR ── */
.fbar{background:#fff;border-bottom:1px solid var(--gy2);
  padding:12px 28px;display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
.flabel{font-size:11px;font-weight:700;color:var(--gy5);text-transform:uppercase;
  letter-spacing:.5px;white-space:nowrap;}
.pills{display:flex;gap:6px;flex-wrap:wrap;}
.pill{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;
  border:1.5px solid var(--gy3);background:#fff;color:var(--gy5);
  cursor:pointer;transition:all .15s;user-select:none;}
.pill:hover{border-color:var(--or);color:var(--or);}
.pill.on{background:var(--or);border-color:var(--or);color:#fff;
  box-shadow:0 2px 8px rgba(216,90,26,.3);}
.fdiv{width:1px;height:28px;background:var(--gy2);}

/* ── VIEWS ── */
.view{display:none;padding:24px 28px;max-width:1440px;margin:0 auto;}
.view.active{display:block;}

/* ── SECTION LABELS ── */
.slabel{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;
  color:var(--gy5);margin:24px 0 12px;display:flex;align-items:center;gap:10px;}
.slabel:first-child{margin-top:0;}
.slabel::after{content:'';flex:1;height:1px;background:var(--gy2);}

/* ── ALERT BAR ── */
.alert-bar{border-radius:var(--r-sm);padding:10px 16px;font-size:13px;font-weight:500;
  display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.alert-bar.warn{background:var(--ye-bg);border-left:4px solid var(--ye);color:#7D6608;}
.alert-bar.good{background:var(--gr-bg);border-left:4px solid var(--gr);color:#1D6A3D;}
.alert-bar.bad{background:var(--re-bg);border-left:4px solid var(--re);color:#922B21;}

/* ── KPI CARDS ── */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;}
.card{background:#fff;border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);
  border-top:3px solid var(--or);position:relative;overflow:hidden;
  transition:transform .15s,box-shadow .15s;}
.card:hover{transform:translateY(-2px);box-shadow:var(--sh2);}
.card.c-gr{border-top-color:var(--gr);}
.card.c-re{border-top-color:var(--re);}
.card.c-bl{border-top-color:var(--bl);}
.card.c-gy{border-top-color:var(--gy4);}
.card.c-ye{border-top-color:var(--ye);}
.c-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  color:var(--gy5);margin-bottom:8px;}
.c-val{font-size:32px;font-weight:800;line-height:1;color:var(--gy7);}
.card.c-gr .c-val{color:var(--gr);}
.card.c-re .c-val{color:var(--re);}
.card.c-bl .c-val{color:var(--bl);}
.card.c-gy .c-val{color:var(--gy4);}
.card.c-ye .c-val{color:var(--ye);}
.c-sub{font-size:12px;color:var(--gy5);margin-top:5px;}
.c-sub b{color:var(--gy7);}
.c-ico{position:absolute;right:14px;top:14px;font-size:26px;opacity:.1;}

/* trend badge */
.trend{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;
  padding:2px 7px;border-radius:12px;margin-top:7px;}
.trend.up{background:var(--gr-bg);color:var(--gr);}
.trend.dn{background:var(--re-bg);color:var(--re);}
.trend.eq{background:var(--gy2);color:var(--gy5);}
.trend.na{background:var(--gy2);color:var(--gy4);font-weight:500;}

/* vs campaign badge */
.trend2{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;
  padding:1px 6px;border-radius:10px;margin-left:4px;}
.trend2.up{background:var(--gr-bg);color:var(--gr);}
.trend2.dn{background:var(--re-bg);color:var(--re);}
.trend2.eq{background:var(--gy2);color:var(--gy5);}

/* ── INSIGHTS ── */
.insights{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.insight{background:#fff;border-radius:var(--r-sm);padding:14px 16px;
  box-shadow:var(--sh);display:flex;gap:12px;align-items:flex-start;}
.ins-ico{font-size:22px;flex-shrink:0;margin-top:1px;}
.ins-title{font-size:12px;font-weight:700;color:var(--gy7);margin-bottom:3px;}
.ins-body{font-size:11px;color:var(--gy5);line-height:1.5;}

/* ── CHART CARDS ── */
.cc{background:#fff;border-radius:var(--r);padding:20px;box-shadow:var(--sh);}
.cc h3{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;
  color:var(--gy5);margin-bottom:14px;}
.cc .ch{position:relative;}

/* ── SPLIT ROW ── */
.split{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.split3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
@media(max-width:900px){.split,.split3{grid-template-columns:1fr;}}

/* ── BAR ROWS ── */
.br{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.br-nm{font-size:11px;color:var(--gy5);width:115px;flex-shrink:0;line-height:1.3;}
.br-tr{flex:1;height:9px;background:var(--gy2);border-radius:6px;overflow:hidden;}
.br-fl{height:100%;border-radius:6px;background:var(--or);transition:width .5s ease;}
.br-fl.gr{background:var(--gr);}
.br-fl.re{background:var(--re);}
.br-fl.bl{background:var(--bl);}
.br-pct{font-size:11px;font-weight:700;color:var(--gy7);width:34px;text-align:right;}

/* ── INTERACCION PILLS ── */
.ip-row{display:flex;gap:10px;flex-wrap:wrap;}
.ip{background:var(--gy1);border-radius:var(--r-sm);padding:12px 16px;flex:1;
  min-width:120px;text-align:center;border:1px solid var(--gy2);}
.ip-v{font-size:24px;font-weight:800;display:block;}
.ip-v.gr{color:var(--gr);}
.ip-v.re{color:var(--re);}
.ip-v.or{color:var(--or);}
.ip-l{font-size:10px;font-weight:700;color:var(--gy5);text-transform:uppercase;
  letter-spacing:.3px;margin-top:3px;display:block;}

/* ── HEATMAP ── */
.hm-wrap{overflow-x:auto;}
.hm{border-collapse:collapse;width:100%;min-width:400px;}
.hm th,.hm td{padding:9px 14px;text-align:center;font-size:12px;}
.hm th{font-weight:700;color:var(--gy5);background:var(--gy1);
  text-transform:uppercase;letter-spacing:.4px;font-size:10px;}
.hm td{border:1px solid var(--gy2);}
.hm tr:hover td{filter:brightness(.95);}
.hm td.hc-0{background:#fff;color:var(--gy5);}
.hm td.hc-1{background:#D5F5E3;color:#1D6A3D;font-weight:700;}
.hm td.hc-2{background:#FDEBD0;color:#784212;font-weight:700;}
.hm td.hc-3{background:#FADBD8;color:#922B21;font-weight:700;}
.hm td.hc-4{background:#C0392B;color:#fff;font-weight:700;}
.hm-leg{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;align-items:center;}
.hm-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--gy5);}
.hm-leg-box{width:14px;height:14px;border-radius:3px;flex-shrink:0;}

/* ── DATA TABLE ── */
.dt{width:100%;border-collapse:collapse;font-size:12px;}
.dt th{background:var(--or);color:#fff;padding:10px 12px;text-align:left;
  font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.4px;
  position:sticky;top:0;}
.dt td{padding:9px 12px;border-bottom:1px solid var(--gy2);}
.dt tr:hover td{background:var(--or-bg);}
.dt tr:nth-child(even) td{background:var(--gy1);}
.dt tr:nth-child(even):hover td{background:var(--or-bg);}
.dt-wrap{overflow-x:auto;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--gy2);}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.badge.gr{background:var(--gr-bg);color:var(--gr);}
.badge.re{background:var(--re-bg);color:var(--re);}
.badge.gy{background:var(--gy2);color:var(--gy5);}
.badge.ye{background:var(--ye-bg);color:#7D6608;}

/* ── SUMMARY STRIP ── */
.summary-strip{display:flex;gap:12px;background:#fff;border-radius:var(--r);
  padding:14px 20px;box-shadow:var(--sh);flex-wrap:wrap;align-items:center;}
.ss-item{display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:0 16px;border-right:1px solid var(--gy2);}
.ss-item:last-child{border-right:none;}
.ss-val{font-size:20px;font-weight:800;color:var(--gy7);}
.ss-lbl{font-size:10px;font-weight:600;color:var(--gy5);text-transform:uppercase;
  letter-spacing:.3px;white-space:nowrap;}

/* ── OBJETIVO LINE ── */
.obj-note{font-size:11px;color:var(--gy5);display:flex;align-items:center;gap:6px;margin-top:8px;}
.obj-dot{width:10px;height:3px;background:#F39C12;border-radius:2px;display:inline-block;}

/* ── SLOPE CHART ── */
.slope-wrap{display:flex;gap:40px;align-items:flex-end;padding:10px 20px;}

/* fade */
.fade{animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

.no-d{font-size:20px;font-weight:700;color:var(--gy4);}
.tag{display:inline-block;padding:1px 7px;border-radius:8px;font-size:10px;font-weight:700;}
.tag.or{background:var(--or-bg);color:var(--or);}
.tag.gr{background:var(--gr-bg);color:var(--gr);}
.tag.re{background:var(--re-bg);color:var(--re);}
</style>

<!-- ══ LOGIN GATE ══ -->
<div id="loginGate">
  <div class="login-box">
    <div class="login-logo">Y</div>
    <div class="login-title">Metas Directora · Maya</div>
    <div class="login-sub">Ingresa la contraseña para acceder al dashboard</div>
    <input class="login-input" id="loginPwd" type="password" placeholder="Contraseña"
      onkeydown="if(event.key==='Enter') checkLogin()"/>
    <button class="login-btn" onclick="checkLogin()">Ingresar →</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-footer">🔒 Acceso restringido · PERU · Yanbal</div>
  </div>
</div>

<script>
const PWD_HASH = 'b1cdd5335bc55103b231d322fbd7b811e3f6b1415ea425a441087832015efafb';
const SESSION_KEY = 'metas_auth';

async function checkLogin(){
  const val = document.getElementById('loginPwd').value;
  if(!val){ document.getElementById('loginErr').textContent='Ingresa la contraseña.'; return; }
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(val));
  const hash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if(hash === PWD_HASH){
    sessionStorage.setItem(SESSION_KEY,'1');
    document.getElementById('loginGate').classList.add('hidden');
  } else {
    document.getElementById('loginErr').textContent='Contraseña incorrecta. Intenta de nuevo.';
    document.getElementById('loginPwd').value='';
    document.getElementById('loginPwd').focus();
  }
}
// Auto-check session
if(sessionStorage.getItem(SESSION_KEY)==='1'){
  document.getElementById('loginGate').classList.add('hidden');
}
</script>

const fmt = n => n!=null ? Number(n).toLocaleString('es-PE') : '–';
const pct = n => n!=null ? n+'%' : '–';
const noD = () => '<span class="no-d">–</span>';

function trendBadge(now, prev, invertGood=false){
  if(now==null||prev==null) return '<span class="trend na">Sin dato anterior</span>';
  const d = now - prev;
  if(Math.abs(d)<0.5) return `<span class="trend eq">= Sin cambio</span>`;
  const isGood = invertGood ? d<0 : d>0;
  const cls = isGood ? 'up' : 'dn';
  const arr = d>0 ? '▲' : '▼';
  return `<span class="trend ${cls}">${arr} ${Math.abs(d)}pp vs sem anterior</span>`;
}
function trendBadgeVsCamp(now, prev, invertGood=false){
  if(now==null||prev==null) return '';
  const d = now - prev;
  if(Math.abs(d)<0.5) return `<span class="trend2 eq">= C.ant</span>`;
  const isGood = invertGood ? d<0 : d>0;
  const cls = isGood ? 'up' : 'dn';
  const arr = d>0 ? '▲' : '▼';
  return `<span class="trend2 ${cls}">${arr}${Math.abs(d)}pp C.ant</span>`;
}
function hmClass(noRegPct){
  if(noRegPct==null) return 'hc-0';
  if(noRegPct<=20) return 'hc-1';
  if(noRegPct<=35) return 'hc-2';
  if(noRegPct<=60) return 'hc-3';
  return 'hc-4';
}

function buildInsights(c,s,d,ps,pcs,camp){
  const ins = [];
  // Registro vs objetivo
  if(d.regMeta!=null){
    const gap = d.regMeta - OBJ_REGISTRO;
    if(gap>=0) ins.push({ico:'✅',t:'Objetivo cumplido',b:`La campaña ${c} alcanzó ${d.regMeta}% de registro, superando el objetivo de ${OBJ_REGISTRO}% en ${gap}pp.`});
    else ins.push({ico:'⚠️',t:'Bajo el objetivo',b:`Faltan ${-gap}pp para alcanzar el objetivo de ${OBJ_REGISTRO}%. Son ~${fmt(Math.round(-gap/100*camp.universo))} directoras adicionales.`});
  }
  // Tendencia vs campaña anterior
  if(pcs?.regMeta!=null&&d.regMeta!=null){
    const d2=d.regMeta-pcs.regMeta;
    if(d2<0) ins.push({ico:'📉',t:'Retroceso vs campaña anterior',b:`El registro bajó ${Math.abs(d2)}pp respecto a la semana ${s} de la campaña anterior (${pcs.regMeta}% → ${d.regMeta}%).`});
    else if(d2>0) ins.push({ico:'📈',t:'Mejora vs campaña anterior',b:`El registro subió ${d2}pp respecto a la semana ${s} de la campaña anterior (${pcs.regMeta}% → ${d.regMeta}%).`});
    else ins.push({ico:'➡️',t:'Sin cambio vs campaña anterior',b:`El registro se mantuvo igual que la semana ${s} de la campaña anterior (${d.regMeta}%).`});
  }
  // Promedio histórico
  if(d.prom!=null&&d.regMeta!=null){
    const dif=d.regMeta-d.prom;
    if(Math.abs(dif)>=2) ins.push({ico:'📌',t:'Comparativa promedio 3 campañas',b:`El registro actual (${d.regMeta}%) está ${Math.abs(dif)}pp ${dif>0?'por encima':'por debajo'} del promedio de las últimas 3 campañas (${d.prom}%).`});
  }
  // Cumplimiento final
  if(d.cumple!=null&&s===4){
    if(d.cumple>=25) ins.push({ico:'🏆',t:'Buen cierre de campaña',b:`Al cierre (Sem 4), el ${d.cumple}% de directoras cumplió su meta — ${fmt(d.cumpleCnt)} directoras.`});
    else ins.push({ico:'🔔',t:'Bajo cumplimiento al cierre',b:`Solo el ${d.cumple}% alcanzó su meta al cierre de campaña. ${fmt(d.noCumpleCnt)} directoras no cumplieron.`});
  }
  // Interacción
  if(d.incr!=null&&d.incr>=70) ins.push({ico:'🚀',t:'Alta tasa de incremento',b:`El ${d.incr}% de las directoras con meta incrementaron su objetivo, señal de ambición y confianza en el ciclo.`});
  // No registró notable
  if(d.noReg>=50) ins.push({ico:'🔴',t:'Alto porcentaje sin registrar',b:`${pct(d.noReg)} del universo no registró meta. Foco recomendado en activación de directoras inactivas.`});

  if(ins.length===0) ins.push({ico:'ℹ️',t:'Sin insights adicionales',b:'No hay patrones destacables para esta combinación de campaña y semana.'});
  return ins.map(i=>`<div class="insight"><div class="ins-ico">${i.ico}</div><div><div class="ins-title">${i.t}</div><div class="ins-body">${i.b}</div></div></div>`).join('');
}

    <div class="ss-item"><span class="ss-val" style="color:var(--re)">${worstNoReg!=null?worstNoReg+'%':'–'}</span><span class="ss-lbl">Mayor No Registró (${worstCamp})</span></div>
    <div class="ss-item"><span class="ss-val" style="color:var(--bl)">${c05s4?.cumple!=null?c05s4.cumple+'%':'–'}</span><span class="ss-lbl">Cumple Meta C05 S4</span></div>
    <div class="ss-item"><span class="ss-val" style="color:var(--or)">${c06s4?.cumple!=null?c06s4.cumple+'%':'–'}</span><span class="ss-lbl">Cumple Meta C06 S4</span></div>
    <div class="ss-item"><span class="ss-val">3,552</span><span class="ss-lbl">Universo (C05–C06)</span></div>
  </div>`);

  // ── SECTION: Evolución temporal full ──
  el.insertAdjacentHTML('beforeend','<div class="slabel">Evolución Completa por Semana · Todas las Campañas</div>');
  el.insertAdjacentHTML('beforeend',`<div class="cc" style="grid-column:1/-1">
    <h3>% Registra Meta y % No Registró — todas las campañas y semanas</h3>
    <div class="ch" style="height:240px;"><canvas id="hc1"></canvas></div>
    <div class="obj-note"><span class="obj-dot"></span>Línea objetivo: ${OBJ_REGISTRO}%</div>
  </div>`);

  // ── SECTION: Progresión cumplimiento semanal ──
  el.insertAdjacentHTML('beforeend','<div class="slabel">Progresión de Cumplimiento de Metas por Semana</div>');
  el.insertAdjacentHTML('beforeend',`<div class="split">
    <div class="cc">
      <h3>% Cumple Metas · evolución semanal por campaña</h3>
      <div class="ch" style="height:200px;"><canvas id="hc2"></canvas></div>
    </div>
    <div class="cc">
      <h3>Comparativo Final (Sem 4) · Registro vs Cumplimiento</h3>
      <div class="ch" style="height:200px;"><canvas id="hc3"></canvas></div>
    </div>
  </div>`);

  // ── SECTION: Heatmap ──
  el.insertAdjacentHTML('beforeend','<div class="slabel">Heatmap % DIR No Registró · Campaña × Semana</div>');
  el.insertAdjacentHTML('beforeend',`<div class="cc">
    <h3>Intensidad de no-registro por combinación campaña/semana</h3>
    <div class="hm-wrap">${buildHeatmap()}</div>
    <div class="hm-leg">
      <span style="font-size:11px;font-weight:700;color:var(--gy5);">Leyenda:</span>
      <div class="hm-leg-item"><div class="hm-leg-box" style="background:#D5F5E3"></div>≤ 20% (Excelente)</div>
      <div class="hm-leg-item"><div class="hm-leg-box" style="background:#FDEBD0"></div>21–35% (Atención)</div>
      <div class="hm-leg-item"><div class="hm-leg-box" style="background:#FADBD8"></div>36–60% (Crítico)</div>
      <div class="hm-leg-item"><div class="hm-leg-box" style="background:#C0392B"></div>&gt;60% (Sin datos/Alarma)</div>
    </div>
  </div>`);

  // ── SECTION: Pendiente slope ──
  el.insertAdjacentHTML('beforeend','<div class="slabel">Comparativo Campaña 05 vs 06 · Semana Final (4)</div>');
  el.insertAdjacentHTML('beforeend',`<div class="cc">
    <h3>Variación de indicadores clave entre campañas (Semana 4)</h3>
    <div class="ch" style="height:200px;"><canvas id="hc4"></canvas></div>
  </div>`);

  setTimeout(()=>{ buildHistCharts(); }, 40);
}

function buildHeatmap(){
  let html=`<table class="hm"><thead><tr><th>Campaña</th><th>Sem 1</th><th>Sem 2</th><th>Sem 3</th><th>Sem 4</th><th>Universo</th></tr></thead><tbody>`;
  CAMP_KEYS.forEach(k=>{
    const c=CAMP[k];
    html+=`<tr><td style="font-weight:700;color:var(--gy7);background:var(--gy1);text-align:left">${k}</td>`;
    [1,2,3,4].forEach(s=>{
      const d=c.semanas[s];
      const cls=hmClass(d.noReg);
      const val=d.noReg!=null?d.noReg+'%':'–';
      html+=`<td class="${cls}" title="${k} Sem${s}: No Registró ${val}">${val}</td>`;
    });
    html+=`<td style="font-weight:600;color:var(--gy6)">${fmt(c.universo)}</td></tr>`;
  });
  html+=`</tbody></table>`;
  return html;
}

function buildHistCharts(){
  // ── Chart 1: Línea completa todas las campañas ──
  destroyChart('hc1');
  const cv1=document.getElementById('hc1'); if(!cv1)return;
  const allLabels=[]; const datasets=[];
  const COLORS={regMeta:['#27AE60','#2ECC71','#1ABC9C'],noReg:['#C0392B','#E74C3C','#E91E63']};
  // Construir labels (todas las semanas de todas las campañas)
  CAMP_KEYS.forEach((k,ki)=>{
    Object.keys(CAMP[k].semanas).forEach(s=>{ allLabels.push(k+' S'+s); });
    // dataset registro
    const regData=[]; const noData=[];
    Object.values(CAMP[k].semanas).forEach(d=>{ regData.push(d.regMeta); noData.push(d.noReg); });
    const baseIdx=ki;
    datasets.push({label:'Reg '+k,data:regData,borderColor:COLORS.regMeta[baseIdx],backgroundColor:'transparent',borderWidth:2.5,pointRadius:4,pointBackgroundColor:COLORS.regMeta[baseIdx],tension:.3,spanGaps:true});
    datasets.push({label:'NoReg '+k,data:noData,borderColor:COLORS.noReg[baseIdx],backgroundColor:'transparent',borderWidth:2,borderDash:[4,3],pointRadius:4,pointBackgroundColor:COLORS.noReg[baseIdx],tension:.3,spanGaps:true});
  });
  // Flatten data per campaign/week
  const flatReg={}, flatNoReg={};
  CAMP_KEYS.forEach(k=>{
    Object.entries(CAMP[k].semanas).forEach(([s,d])=>{ const lbl=k+' S'+s; flatReg[lbl]=d.regMeta; flatNoReg[lbl]=d.noReg; });
  });
  const uLabels=allLabels;
  const ds2=CAMP_KEYS.map((k,ki)=>({
    label:'Reg '+k,
    data:uLabels.map(l=>l.startsWith(k)?flatReg[l]:null),
    borderColor:COLORS.regMeta[ki],backgroundColor:'transparent',
    borderWidth:2.5,pointRadius:4,pointBackgroundColor:COLORS.regMeta[ki],tension:.3,spanGaps:false
  })).concat(CAMP_KEYS.map((k,ki)=>({
    label:'NoReg '+k,
    data:uLabels.map(l=>l.startsWith(k)?flatNoReg[l]:null),
    borderColor:COLORS.noReg[ki],backgroundColor:'transparent',
    borderWidth:2,borderDash:[5,4],pointRadius:4,pointBackgroundColor:COLORS.noReg[ki],tension:.3,spanGaps:false
  })));

  charts['hc1']=new Chart(cv1,{
    type:'line',data:{labels:uLabels,datasets:ds2},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{font:{size:10},padding:8,boxWidth:12}}},
      scales:{
        x:{grid:{display:false},ticks:{font:{size:9},maxRotation:35}},
        y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:10}},grid:{color:'rgba(0,0,0,.05)'},
          afterDataLimits(axis){axis.max=100;}}
      }
    }
  });

  // ── Chart 2: Cumplimiento por semana por campaña ──
  destroyChart('hc2');
  const cv2=document.getElementById('hc2'); if(!cv2)return;
  const semLabels=['Sem 1','Sem 2','Sem 3','Sem 4'];
  const cumDs=CAMP_KEYS.filter(k=>CAMP[k].semanas[1].cumple!=null||CAMP[k].semanas[4].cumple!=null).map((k,ki)=>({
    label:k,
    data:[1,2,3,4].map(s=>CAMP[k].semanas[s].cumple),
    borderColor:['#2980B9','#27AE60','#D85A1A'][ki]||'#888',
    backgroundColor:'transparent',borderWidth:2.5,
    pointRadius:5,pointBackgroundColor:['#2980B9','#27AE60','#D85A1A'][ki]||'#888',
    tension:.3,spanGaps:true
  }));
  charts['hc2']=new Chart(cv2,{
    type:'line',data:{labels:semLabels,datasets:cumDs},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{font:{size:10},padding:8,boxWidth:12}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}}}
    }
  });

  // ── Chart 3: Radar/bar comparativo final ──
  destroyChart('hc3');
  const cv3=document.getElementById('hc3'); if(!cv3)return;
  const metricLabels=['Registra Meta','No Registró','Cumple Metas','No Cumple'];
  const campColors=['rgba(41,128,185,.7)','rgba(39,174,96,.7)','rgba(216,90,26,.7)'];
  const c3ds=CAMP_KEYS.map((k,ki)=>{
    const d=CAMP[k].semanas[4];
    return{label:k,data:[d.regMeta,d.noReg,d.cumple,d.noCumple],
      backgroundColor:campColors[ki],borderColor:campColors[ki].replace('.7','1'),borderWidth:1.5,borderRadius:5};
  });
  charts['hc3']=new Chart(cv3,{
    type:'bar',data:{labels:metricLabels,datasets:c3ds},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{font:{size:10},padding:8,boxWidth:12}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}}}
    }
  });

  // ── Chart 4: Slope / comparación C05 vs C06 Sem4 ──
  destroyChart('hc4');
  const cv4=document.getElementById('hc4'); if(!cv4)return;
  const metrics=['Registra Meta','No Registró','Cumple Metas','No Cumple'];
  const v05=[CAMP['202605'].semanas[4].regMeta,CAMP['202605'].semanas[4].noReg,CAMP['202605'].semanas[4].cumple,CAMP['202605'].semanas[4].noCumple];
  const v06=[CAMP['202606'].semanas[4].regMeta,CAMP['202606'].semanas[4].noReg,CAMP['202606'].semanas[4].cumple,CAMP['202606'].semanas[4].noCumple];
  charts['hc4']=new Chart(cv4,{
    type:'bar',data:{labels:metrics,
      datasets:[
        {label:'C05 Sem4',data:v05,backgroundColor:'rgba(41,128,185,.75)',borderColor:'#2980B9',borderWidth:1.5,borderRadius:5},
        {label:'C06 Sem4',data:v06,backgroundColor:'rgba(216,90,26,.75)',borderColor:'#D85A1A',borderWidth:1.5,borderRadius:5},
      ]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
      plugins:{legend:{position:'top',labels:{font:{size:10},padding:8,boxWidth:12}},
        tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw!=null?ctx.raw+'%':'Sin datos'}`}}},
      scales:{x:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}},
        y:{grid:{display:false},ticks:{font:{size:11}}}}
    }
  });
}

// ════════════════════════════════════════════════════════
// DATA TABLE VIEW
// ════════════════════════════════════════════════════════
function renderData(){
  const el=document.getElementById('view-data');
  el.innerHTML='';
  el.insertAdjacentHTML('beforeend','<div class="slabel">Tabla Completa · Todos los Datos por Campaña y Semana</div>');

  const rows=[];
  CAMP_KEYS.forEach(k=>{
    Object.entries(CAMP[k].semanas).forEach(([s,d])=>{
      rows.push({camp:k,sem:s,fecha:d.fecha,...d, universo:CAMP[k].universo});
    });
  });

  const badgePct=(v,inv=false)=>{
    if(v==null) return '<span class="badge gy">–</span>';
    const cls = inv ? (v>50?'re':v>25?'ye':'gr') : (v>=80?'gr':v>=60?'ye':'re');
    return `<span class="badge ${cls}">${v}%</span>`;
  };
  const badgeNR=(v)=>{
    if(v==null) return '<span class="badge gy">–</span>';
    return `<span class="badge ${v>=50?'re':v>=25?'ye':'gr'}">${v}%</span>`;
  };

  let tbl=`<div class="dt-wrap"><table class="dt">
    <thead><tr>
      <th>Campaña</th><th>Sem</th><th>Fecha</th><th>Universo</th>
      <th>Registra Meta</th><th>No Registró</th><th>Prom 3C</th>
      <th>Cumple Metas</th><th>No Cumple</th>
      <th>Incrementa</th><th>Mantiene</th><th>Redujo</th>
    </tr></thead><tbody>`;
  rows.forEach(r=>{
    tbl+=`<tr>
      <td><span class="tag or"><b>${r.camp}</b></span></td>
      <td style="font-weight:700">Sem ${r.sem}</td>
      <td style="color:var(--gy5)">${r.fecha}</td>
      <td style="font-weight:600">${fmt(r.universo)}</td>
      <td>${badgePct(r.regMeta)}<br><small style="color:var(--gy5)">${r.regCnt!=null?fmt(r.regCnt):''}</small></td>
      <td>${badgeNR(r.noReg)}<br><small style="color:var(--gy5)">${r.noRegCnt!=null?fmt(r.noRegCnt):''}</small></td>
      <td>${r.prom!=null?`<span class="badge bl" style="background:var(--bl-bg);color:var(--bl)">${r.prom}%</span>`:'<span class="badge gy">–</span>'}</td>
      <td>${r.cumple!=null?`${badgePct(r.cumple)}<br><small style="color:var(--gy5)">${fmt(r.cumpleCnt)}</small>`:'<span class="badge gy">–</span>'}</td>
      <td>${r.noCumple!=null?`${badgePct(r.noCumple,true)}<br><small style="color:var(--gy5)">${fmt(r.noCumpleCnt)}</small>`:'<span class="badge gy">–</span>'}</td>
      <td>${r.incr!=null?`<span class="tag gr">${r.incr}%</span>`:'–'}</td>
      <td>${r.mant!=null?`<span class="tag or">${r.mant}%</span>`:'–'}</td>
      <td>${r.red!=null?`<span class="tag re" style="background:var(--re-bg);color:var(--re)">${r.red}%</span>`:'–'}</td>
    </tr>`;
  });
  tbl+=`</tbody></table></div>`;
  el.insertAdjacentHTML('beforeend',tbl);

  // Download CSV button
  el.insertAdjacentHTML('beforeend',`<div style="margin-top:14px;">
    <button onclick="downloadCSV()" style="background:var(--or);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;">⬇ Exportar CSV</button>
  </div>`);
}

function downloadCSV(){
  const rows=[['Campaña','Semana','Fecha','Universo','RegistraMeta%','RegistraMetaCnt','NoRegistro%','NoRegistroCnt','Prom3Camp%','CumpleMetas%','CumpleMetasCnt','NoCumple%','NoCumpleCnt','Incrementa%','Mantiene%','Redujo%']];
  CAMP_KEYS.forEach(k=>{
    Object.entries(CAMP[k].semanas).forEach(([s,d])=>{
      rows.push([k,s,d.fecha,CAMP[k].universo,d.regMeta??'',d.regCnt??'',d.noReg??'',d.noRegCnt??'',d.prom??'',d.cumple??'',d.cumpleCnt??'',d.noCumple??'',d.noCumpleCnt??'',d.incr??'',d.mant??'',d.red??'']);
    });
  });
  const csv=rows.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv);
  a.download='metas_directoras_historico.csv'; a.click();
}
</script>
